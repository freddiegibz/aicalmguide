  <style>
    :root {
      --paper: #f8f6ee;
      --ink: #1c1b18;
      --muted: #5f5b52;
      --line: #ded7c6;
      --gold: #f2bd16;
      --gold-deep: #d99a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Aptos, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fbfaf4 0%, var(--paper) 100%);
    }
    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(640px, 100%);
      padding: 34px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,253,247,.92);
      box-shadow: 0 24px 60px rgba(48,43,32,.12);
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      color: #9d7606;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1.05;
      font-weight: 600;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid #d8cfbc;
      background: #fffaf1;
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
    }
    .price {
      margin-top: 16px;
      color: #6b655c;
      font-size: 14px;
    }
    noscript img { position:absolute; left:-9999px; }
